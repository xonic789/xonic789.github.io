<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AWS Client VPN certificate flow</title>
  <desc id="desc">Mutual TLS diagram showing a certificate authority issuing server and client certificates, users connecting with client certificates, the VPN endpoint validating certificates, and revoked certificates being blocked through a certificate revocation list.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="caCard" x1="70" y1="110" x2="420" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="vpnCard" x1="790" y1="150" x2="1130" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFEDD5"/>
      <stop offset="1" stop-color="#FED7AA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#16A34A"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#DC2626"/>
    </marker>
    <style>
      .title { font: 700 30px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .section { font: 700 20px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .label { font: 600 17px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .body { font: 500 15px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #334155; }
      .small { font: 500 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
      .pillBlue { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #1D4ED8; }
      .pillGreen { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #047857; }
      .pillRed { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #B91C1C; }
      .note { font: 600 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="860" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" class="title">AWS Client VPN 인증서 기반 접근 원리</text>
  <text x="60" y="112" class="body">핵심은 서버와 클라이언트가 서로의 인증서를 검증하는 Mutual TLS와, CRL 기반 권한 회수다.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="320" height="180" rx="28" fill="url(#caCard)" stroke="#F59E0B" stroke-width="2"/>
    <text x="102" y="200" class="section">Certificate Authority</text>
    <text x="102" y="230" class="body">신뢰의 기준이 되는 루트 또는 중간 CA</text>
    <rect x="102" y="258" width="170" height="34" rx="17" fill="#FEFCE8"/>
    <text x="123" y="280" class="pillBlue">인증서 서명 및 발급</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="150" width="250" height="120" rx="24" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="478" y="192" class="label">Server Certificate</text>
    <text x="478" y="218" class="small">ACM에 등록</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="290" width="250" height="160" rx="24" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="478" y="332" class="label">Client Certificates</text>
    <text x="478" y="358" class="small">사용자별로 발급</text>
    <text x="478" y="384" class="small">`.ovpn` 프로파일과 함께 배포</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="180" width="320" height="220" rx="28" fill="url(#vpnCard)" stroke="#FB923C" stroke-width="2"/>
    <text x="822" y="228" class="section">AWS Client VPN Endpoint</text>
    <text x="822" y="258" class="body">서버 인증서를 제시하고</text>
    <text x="822" y="284" class="body">클라이언트 인증서를 검증</text>

    <rect x="822" y="318" width="120" height="34" rx="17" fill="#DBEAFE"/>
    <text x="849" y="340" class="pillBlue">Mutual TLS</text>

    <rect x="956" y="318" width="120" height="34" rx="17" fill="#D1FAE5"/>
    <text x="980" y="340" class="pillGreen">CRL Check</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="470" width="320" height="160" rx="28" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
    <text x="822" y="514" class="section">권한 회수</text>
    <text x="822" y="544" class="body">폐기된 인증서는 CRL에 누적 반영</text>
    <text x="822" y="570" class="body">Endpoint가 연결 시 폐기 여부 확인</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="520" width="280" height="150" rx="26" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="102" y="564" class="section">사용자 PC</text>
    <text x="102" y="594" class="body">AWS VPN Client</text>
    <text x="102" y="620" class="small">`.ovpn` + 개인 Client Certificate</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="560" width="250" height="90" rx="22" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
    <text x="448" y="598" class="label">Certificate Revocation List</text>
    <text x="448" y="622" class="small">폐기 이력 전체를 누적 관리</text>
  </g>

  <path d="M390 210H450" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="408" y="194" class="note">서버 인증서 발급</text>

  <path d="M390 290H450" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="404" y="274" class="note">클라이언트 인증서 발급</text>

  <path d="M700 210H790" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="708" y="194" class="note">서버 인증서 연결</text>

  <path d="M350 595H790" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="485" y="578" class="note">사용자가 Client Certificate로 접속</text>

  <path d="M670 605H790" stroke="#DC2626" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="682" y="588" class="note">CRL 업로드</text>

  <path d="M950 400V470" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="972" y="440" class="note">폐기 여부 검증</text>

  <rect x="70" y="715" width="1040" height="92" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="106" cy="760" r="10" fill="#2563EB"/>
  <text x="130" y="752" class="label">1. CA가 서버 인증서와 사용자별 클라이언트 인증서를 발급한다.</text>
  <text x="130" y="778" class="label">2. 연결 시 Endpoint는 서버 신원을 증명하고, 사용자는 클라이언트 인증서로 자신을 증명한다.</text>
  <text x="130" y="804" class="label">3. 오프보딩 시 인증서를 폐기하고 CRL을 갱신해 재접속을 막는다.</text>

  <rect x="960" y="120" width="120" height="34" rx="17" fill="#DBEAFE"/>
  <text x="987" y="142" class="pillBlue">mTLS</text>

  <rect x="1088" y="120" width="56" height="34" rx="17" fill="#FEE2E2"/>
  <text x="1104" y="142" class="pillRed">CRL</text>
</svg>
