<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AWS Client VPN private access architecture</title>
  <desc id="desc">Diagram showing users connecting through AWS Client VPN to an operations VPC that provides access to private resources, peered service VPCs, and a development VPC.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="vpnCard" x1="380" y1="90" x2="720" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="vpcCard" x1="760" y1="60" x2="1140" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 30px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .section { font: 700 19px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .label { font: 600 17px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .body { font: 500 15px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #334155; }
      .small { font: 500 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
      .pill { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #1D4ED8; }
      .pillGreen { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #047857; }
      .note { font: 600 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" class="title">AWS Client VPN으로 운영용 Private 리소스 접근을 표준화한 구조</text>
  <text x="60" y="112" class="body">사용자는 하나의 VPN 진입점으로 접속하고, 운영용 VPC를 통해 내부 리소스와 연결된 VPC에 접근한다.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="160" width="250" height="210" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="90" y="205" class="section">사용자 PC</text>
    <rect x="90" y="226" width="190" height="68" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="108" y="252" class="label">AWS VPN Client</text>
    <text x="108" y="276" class="small">.ovpn + Client Certificate</text>
    <rect x="90" y="312" width="190" height="34" rx="17" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="110" y="334" class="note">사용자별 인증 정보로 접속</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="140" width="320" height="250" rx="28" fill="url(#vpnCard)" stroke="#FDBA74" stroke-width="2"/>
    <text x="410" y="190" class="section">AWS Client VPN Endpoint</text>
    <text x="410" y="220" class="body">운영 접근의 공통 진입점</text>

    <rect x="410" y="248" width="96" height="34" rx="17" fill="#DBEAFE"/>
    <text x="432" y="270" class="pill">UDP 443</text>

    <rect x="520" y="248" width="112" height="34" rx="17" fill="#DBEAFE"/>
    <text x="539" y="270" class="pill">Mutual TLS</text>

    <rect x="410" y="298" width="112" height="34" rx="17" fill="#D1FAE5"/>
    <text x="430" y="320" class="pillGreen">Split Tunnel</text>

    <rect x="410" y="348" width="250" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.72"/>
    <text x="430" y="365" class="small">내부 리소스에 필요한 대역만 VPN 라우팅</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="110" width="380" height="560" rx="32" fill="url(#vpcCard)" stroke="#86EFAC" stroke-width="2"/>
    <text x="790" y="160" class="section">운영용 VPC</text>
    <text x="790" y="188" class="body">Private 리소스 접근과 네트워크 연결의 중심</text>

    <rect x="790" y="220" width="320" height="88" rx="22" fill="#FFFFFF" fill-opacity="0.88" stroke="#BBF7D0"/>
    <text x="816" y="255" class="label">VPC DNS / Private Hosted Zone</text>
    <text x="816" y="281" class="small">내부 ALB, Grafana, 사설 도메인 해석</text>

    <rect x="790" y="336" width="320" height="146" rx="22" fill="#FFFFFF" fill-opacity="0.88" stroke="#BBF7D0"/>
    <text x="816" y="372" class="label">내부 리소스</text>
    <text x="816" y="400" class="body">Internal ALB</text>
    <text x="816" y="426" class="body">RDS</text>
    <text x="816" y="452" class="body">Grafana / 운영 도구</text>

    <rect x="790" y="512" width="148" height="108" rx="22" fill="#FFFFFF" fill-opacity="0.88" stroke="#BBF7D0"/>
    <text x="814" y="550" class="label">서비스 VPC</text>
    <text x="814" y="576" class="small">VPC Peering</text>

    <rect x="962" y="512" width="148" height="108" rx="22" fill="#FFFFFF" fill-opacity="0.88" stroke="#BBF7D0"/>
    <text x="992" y="550" class="label">개발 VPC</text>
    <text x="986" y="576" class="small">분리된 환경 접근</text>
  </g>

  <path d="M310 265H380" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="322" y="248" class="note">공통 접속 경로</text>

  <path d="M700 265H760" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="705" y="248" class="note">운영망 진입</text>

  <path d="M950 308V336" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M950 482V512" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M950 482L864 512" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M950 482L1036 512" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="60" y="520" width="640" height="120" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="565" class="section">Split Tunnel 동작</text>
  <text x="90" y="596" class="body">일반 인터넷 트래픽은 로컬 네트워크를 유지하고, 내부 리소스용 경로만 VPN으로 전달한다.</text>
  <path d="M530 540C585 520 634 520 680 540" stroke="#64748B" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowMuted)"/>
  <text x="538" y="578" class="note">Local Internet Path</text>

  <rect x="790" y="688" width="320" height="34" rx="17" fill="#DCFCE7"/>
  <text x="835" y="710" class="pillGreen">Security Group과 라우팅 정책은 별도로 허용 필요</text>
</svg>
