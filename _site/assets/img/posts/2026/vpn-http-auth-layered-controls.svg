<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Layered VPN and HTTP cryptographic controls</title>
  <desc id="desc">Layered diagram showing certificate chain verification and private key proof during VPN mutual TLS, tunnel session-key encryption, internal HTTPS as a separate TLS session, and HTTP application authentication as distinct but connected controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="layer1" x1="120" y1="190" x2="1080" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="layer2" x1="120" y1="340" x2="1080" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="layer3" x1="120" y1="500" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#BBF7D0"/>
    </linearGradient>
    <linearGradient id="layer4" x1="120" y1="660" x2="1080" y2="810" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#0F172A"/>
    </marker>
    <style>
      .title { font: 700 30px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .section { font: 700 21px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .label { font: 700 17px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .body { font: 500 15px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #334155; }
      .small { font: 500 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
      .pillBlue { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #1D4ED8; }
      .pillGreen { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #047857; }
      .pillAmber { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #B45309; }
    </style>
  </defs>

  <rect width="1200" height="900" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" class="title">인증과 암호화를 계층별로 나누어 보기</text>
  <text x="60" y="112" class="body">인증서 체인 검증, 세션 키 기반 터널 보호, 내부 HTTPS, HTTP 요청 인증은 서로 연결되지만 같은 객체를 보호하지 않는다.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="180" width="960" height="116" rx="28" fill="url(#layer1)" stroke="#93C5FD" stroke-width="2"/>
    <text x="158" y="225" class="section">Layer 1. VPN 진입 인증</text>
    <text x="158" y="255" class="body">서버와 클라이언트는 X.509 인증서 체인을 검증하고, 각자 개인 키 소유를 핸드셰이크로 증명한다.</text>
    <rect x="158" y="268" width="92" height="30" rx="15" fill="#EFF6FF"/>
    <text x="183" y="288" class="pillBlue">mTLS</text>
    <text x="280" y="288" class="small">보장: 어떤 주체가 신뢰 가능한 터널을 열 수 있는가</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="330" width="960" height="126" rx="28" fill="url(#layer2)" stroke="#7DD3FC" stroke-width="2"/>
    <text x="158" y="375" class="section">Layer 2. 터널 암호화</text>
    <text x="158" y="405" class="body">핸드셰이크 뒤 합의된 대칭 세션 키로 내부 DNS, 사설 IP, 운영용 패킷이 보호된다.</text>
    <rect x="158" y="418" width="134" height="30" rx="15" fill="#E0F2FE"/>
    <text x="183" y="438" class="pillBlue">Tunnel Encryption</text>
    <text x="320" y="438" class="small">보장: 공용 네트워크 구간 패킷의 기밀성 및 무결성</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="490" width="960" height="126" rx="28" fill="url(#layer3)" stroke="#86EFAC" stroke-width="2"/>
    <text x="158" y="535" class="section">Layer 3. 내부 HTTPS 전송 보호</text>
    <text x="158" y="565" class="body">Internal ALB와 운영용 웹 서비스는 VPN 위에서 다시 별도 TLS 세션을 만들고 HTTP 메시지를 보호한다.</text>
    <rect x="158" y="578" width="84" height="30" rx="15" fill="#DCFCE7"/>
    <text x="180" y="598" class="pillGreen">HTTPS</text>
    <text x="270" y="598" class="small">보장: 애플리케이션 메시지 보호와 서비스 신원 확인</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="650" width="960" height="146" rx="28" fill="url(#layer4)" stroke="#FCD34D" stroke-width="2"/>
    <text x="158" y="695" class="section">Layer 4. HTTP 요청 인증과 권한 판단</text>
    <text x="158" y="725" class="body">세션 쿠키, `Authorization`, OIDC/OAuth 2.0, SSO, RBAC 등이 메시지 주체와 수행 권한을 다시 판단한다.</text>
    <rect x="158" y="738" width="156" height="30" rx="15" fill="#FEF3C7"/>
    <text x="183" y="758" class="pillAmber">App Authentication</text>
    <text x="340" y="758" class="small">보장: 누가 어떤 HTTP 요청을 수행할 수 있는가</text>
  </g>

  <path d="M600 296V330" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M600 456V490" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M600 616V650" stroke="#0F172A" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="120" y="820" width="960" height="44" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="152" y="848" class="label">핵심: mTLS는 터널 주체를, 터널 암호화는 패킷을, HTTPS는 메시지를, HTTP 인증은 행위 권한을 다룬다.</text>
</svg>
