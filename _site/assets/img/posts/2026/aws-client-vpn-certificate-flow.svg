<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AWS Client VPN certificate trust model</title>
  <desc id="desc">Diagram focused on certificate trust: a certificate authority signs server and client certificates, the server and user prove possession of private keys, the endpoint verifies the certificate chain, and revoked certificates are blocked through a certificate revocation list.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="caCard" x1="70" y1="110" x2="430" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="verifyCard" x1="760" y1="130" x2="1120" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#16A34A"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#DC2626"/>
    </marker>
    <style>
      .title { font: 700 30px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .section { font: 700 20px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .label { font: 600 17px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0F172A; }
      .body { font: 500 15px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #334155; }
      .small { font: 500 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
      .pillBlue { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #1D4ED8; }
      .pillGreen { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #047857; }
      .pillRed { font: 700 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #B91C1C; }
      .note { font: 600 13px "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1200" height="860" rx="32" fill="url(#bg)"/>
  <text x="60" y="78" class="title">AWS Client VPN 인증서 신뢰 모델</text>
  <text x="60" y="112" class="body">중심은 통신 경로가 아니라, 어떤 인증서를 신뢰하고 누가 개인 키 소유를 증명하는가에 있다.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="320" height="190" rx="28" fill="url(#caCard)" stroke="#F59E0B" stroke-width="2"/>
    <text x="100" y="212" class="section">Certificate Authority</text>
    <text x="100" y="242" class="body">신뢰의 루트가 되는 서명 주체</text>
    <rect x="100" y="272" width="144" height="34" rx="17" fill="#FFFBEB"/>
    <text x="126" y="294" class="pillBlue">서명 기준점</text>
    <text x="100" y="326" class="small">서버 인증서와 사용자 인증서를 모두 서명</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="150" width="250" height="140" rx="24" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="488" y="194" class="label">Server Certificate</text>
    <text x="488" y="220" class="small">Endpoint 신원 증명</text>
    <text x="488" y="246" class="small">개인 키는 서버 측에만 보관</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="460" y="330" width="250" height="160" rx="24" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="488" y="374" class="label">Client Certificate</text>
    <text x="488" y="400" class="small">사용자 신원 증명</text>
    <text x="488" y="426" class="small">개인 키 소유자가 직접 서명 응답</text>
    <text x="488" y="452" class="small">`.ovpn`과 함께 배포 가능</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="170" width="340" height="250" rx="28" fill="url(#verifyCard)" stroke="#60A5FA" stroke-width="2"/>
    <text x="800" y="222" class="section">AWS Client VPN Endpoint</text>
    <text x="800" y="252" class="body">1. 서버 인증서를 제시한다</text>
    <text x="800" y="278" class="body">2. 클라이언트 인증서 체인을 검증한다</text>
    <text x="800" y="304" class="body">3. 개인 키 소유 증명을 확인한다</text>
    <rect x="800" y="338" width="124" height="34" rx="17" fill="#DBEAFE"/>
    <text x="832" y="360" class="pillBlue">mTLS</text>
    <rect x="938" y="338" width="132" height="34" rx="17" fill="#DCFCE7"/>
    <text x="970" y="360" class="pillGreen">체인 검증</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="520" width="320" height="160" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="100" y="566" class="section">사용자 PC</text>
    <text x="100" y="596" class="body">AWS VPN Client</text>
    <text x="100" y="622" class="small">클라이언트 인증서 + 개인 키 보유</text>
    <text x="100" y="648" class="small">개인 키 자체는 전송되지 않음</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="560" width="270" height="100" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
    <text x="480" y="600" class="label">Private Key Possession</text>
    <text x="480" y="626" class="small">서명 응답으로 소유를 증명</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="500" width="320" height="160" rx="28" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
    <text x="820" y="546" class="section">CRL 기반 권한 회수</text>
    <text x="820" y="576" class="body">한 번 발급한 인증서라도</text>
    <text x="820" y="602" class="body">신뢰를 철회하면 재접속을 막을 수 있다</text>
  </g>

  <path d="M390 240H460" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="404" y="224" class="note">CA 서명</text>

  <path d="M390 380H460" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="404" y="364" class="note">CA 서명</text>

  <path d="M710 220H770" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="718" y="204" class="note">서버 신원 제시</text>

  <path d="M390 600H770" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="516" y="582" class="note">클라이언트 인증서 제시</text>

  <path d="M720 610H770" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="710" y="644" class="note">소유 증명 확인</text>

  <path d="M950 420V500" stroke="#DC2626" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="974" y="462" class="note">폐기 여부 확인</text>

  <path d="M720 610C780 648 842 664 920 664" stroke="#DC2626" stroke-width="3.5" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="732" y="690" class="note">폐기되면 연결 거부</text>

  <rect x="70" y="726" width="1040" height="96" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="102" y="766" class="label">1. 신뢰는 CA 서명에서 시작된다.</text>
  <text x="102" y="792" class="label">2. 서버와 사용자는 각자 개인 키를 직접 보여주지 않고, 서명 응답으로 소유를 증명한다.</text>
  <text x="102" y="818" class="label">3. 오프보딩은 계정 삭제보다 인증서 신뢰 철회와 CRL 반영이 본질이다.</text>
</svg>
